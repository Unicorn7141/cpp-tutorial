name: Qodana

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake and Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure CMake (generate compile_commands.json)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          ls -l build/compile_commands.json

      - name: Run Qodana (non-blocking)
        run: |
          mkdir -p qodana-results
          docker run --rm \
            -v "${{ github.workspace }}:/data/project" \
            -v "${{ github.workspace }}/qodana-results:/data/results" \
            jetbrains/qodana-clang:2025.3-eap \
            --compile-commands build/compile_commands.json \
            --fail-threshold 9999 \
            || true

      - name: Qodana Scan Badge
        # You may pin to the exact commit or the version.
        # uses: joaofouyer/qodana-action-badge@e00e4a5c0b9e551c1d6fdb092327a801d4869203
        uses: joaofouyer/qodana-action-badge@0.5.0
        with:
          # The output from Qodana Scan. {{ steps.qodana_scan.outputs.summary }}
          qodana-output: 
          # Generate Test Coverage Badge
          generate-coverage: # optional, default is false
          # Generate Code Quality Badge
          generate-quality: # optional, default is false
          # Generate a button to Qodana Report with link
          generate-qodana-button: # optional, default is false
          
      - name: Sarif Markdown Report
        # You may pin to the exact commit or the version.
        # uses: b-zurg/sarif-to-markdown@bf8450377ef09ec46ad15ab45c7dacb3e292cbc0
        uses: b-zurg/sarif-to-markdown@v1
        with:
          # Path to the sarif file
          file-path: 
          # Append the Markdown report to the GitHub Actions job summary.
          add-job-summary: # optional, default is true
          
      - name: Upload Qodana report
        uses: actions/upload-artifact@v4
        with:
          name: qodana-report
          path: qodana-results
