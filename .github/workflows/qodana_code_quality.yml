name: Qodana

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@latest
        with:
          # Override the nonexistent jetbrains/qodana-cpp:2025.3
          args: --image,jetbrains/qodana-clang:2025.3-eap
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_883679330 }}
          QODANA_ENDPOINT: https://qodana.cloud
