name: Qodana

on:
  workflow_dispatch:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main, 'releases/*']

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libfmt-dev
          git clone https://github.com/catchorg/Catch2.git --branch v3.13.0 --depth 1
          cd Catch2
          cmake -B build -DBUILD_TESTING=OFF
          sudo cmake --build build --target install
          
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          test -f build/compile_commands.json
          ls -l build/compile_commands.json

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        with:
          args: |
            --compile-commands,build/compile_commands.json
          results-dir: ${{ runner.temp }}/qodana-results
          upload-result: true
          artifact-name: qodana-report
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
