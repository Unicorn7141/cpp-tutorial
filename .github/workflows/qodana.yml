name: Qodana

on:
  workflow_dispatch:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main, 'releases/*' ]

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake and Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Configure CMake (generate compile_commands.json)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          ls -l build/compile_commands.json

      - name: Run Qodana
        uses: JetBrains/qodana-action@v2025.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          args: --linter,jetbrains/qodana-clang:2025.3-eap,--compile-commands,build/compile_commands.json
          results-dir: ${{ runner.temp }}/qodana-results
          upload-result: true
          artifact-name: qodana-report
